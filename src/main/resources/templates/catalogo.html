<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/catalogo.css}">
    <title>Catálogo | THAILU</title>
</head>
<body>
<div class="page-container">
    <header class="header">
        <div class="logo">
            <img th:src="@{/assets/images/logo/logo.png}" alt="THAILU Balanzas Industriales">
        </div>
        <nav class="navbar">
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/nosotros}">Nosotros</a></li>
                <li><a th:href="@{/servicios}">Servicios</a></li>
                <li><a class="active" th:href="@{/catalogo}">Catalogo</a></li>
                <li><a th:href="@{/login}">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="catalogo-hero">
            <h1>CATÁLOGO</h1>
        </section>

        <section class="catalogo-content">
            <!-- Si hay productos -->
            <div th:if="${!#lists.isEmpty(productos)}">
                <div th:each="p, iterStat : ${productos}"
                     th:class="${iterStat.odd} ? 'product-row reverse' : 'product-row'">

                    <div class="product-image">
                        <img th:src="${p.imagenUrl}" th:alt="${p.nombre}">
                    </div>

                    <div class="product-info">
                        <h2 th:text="${p.nombre}">Nombre Producto</h2>
                        <div class="title-line"></div>
                        <ul>
                            <li th:each="linea : ${#strings.arraySplit(p.descripcion, '\n')}"
                                th:text="${linea}">Característica</li>
                        </ul>

                        <!-- Botón WhatsApp estilizado -->
                        <a th:href="'https://wa.me/51999999999?text=Hola,%20estoy%20interesado%20en%20el%20producto:%20' + ${p.nombre}"
                           class="btn-whatsapp"
                           target="_blank">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                            </svg>
                            Consultar por WhatsApp
                        </a>
                    </div>
                </div>
            </div>

            <!-- Si NO hay productos -->
            <div class="catalogo-vacio" th:if="${#lists.isEmpty(productos)}">
                <p>Próximamente nuevos productos...</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 THAILU Balanzas Industriales. Todos los derechos reservados.</p>
    </footer>
</div>
</body>
</html>
